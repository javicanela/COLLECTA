services:
  postgres:
    image: postgres:16
    container_name: collecta-test-postgres
    environment:
      POSTGRES_USER: collecta
      POSTGRES_PASSWORD: collecta
      POSTGRES_DB: collecta_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collecta -d collecta_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - collecta-test-postgres-data:/var/lib/postgresql/data

volumes:
  collecta-test-postgres-data:
